# Release workflow — auto-tag, publish to crates.io, and create GitHub Release.
#
# Trigger: push a commit to master with message `release: v*.*.*`.
# The version in the commit message must match Cargo.toml.
#
# Required secrets:
#   - CARGO_REGISTRY_TOKEN — crates.io API token with publish permission

name: release

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: check for version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      - id: parse
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | sed -nE 's/^release: v([0-9]+\.[0-9]+\.[0-9]+).*$/\1/p')
          if [ -z "$VERSION" ]; then
            echo "No version bump commit detected. Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: verify Cargo.toml version matches
        if: steps.parse.outputs.skip != 'true'
        run: |
          EXPECT="${{ steps.parse.outputs.version }}"
          ACTUAL=$(grep '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$EXPECT" != "$ACTUAL" ]; then
            echo "Version mismatch: commit says v$EXPECT, Cargo.toml says v$ACTUAL"
            exit 1
          fi
          echo "Cargo.toml version $ACTUAL matches commit message."

  verify:
    name: verify
    needs: check-version
    if: needs.check-version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        run: cargo test

  tag-and-release:
    name: tag, publish, and release ${{ needs.check-version.outputs.tag }}
    needs: [check-version, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: create and push tag
        run: |
          git tag "${{ needs.check-version.outputs.tag }}"
          git push origin "${{ needs.check-version.outputs.tag }}"

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
