# Release workflow — publish to crates.io and create GitHub Release.
#
# Trigger: push a tag matching `v*` (tag is auto-created by CI on
# `release: v*.*.*` commit messages).
#
# Required secrets:
#   - CARGO_REGISTRY_TOKEN — crates.io API token with publish permission

name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        run: cargo test

  publish-and-release:
    name: publish and release ${{ github.ref_name }}
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
